<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>加入伺服器 - Joining Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
        }

        /* 伺服器選擇列表 */
        .server-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .server-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .server-card:hover {
            background: rgba(46, 204, 113, 0.15);
            border-color: rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.15);
        }

        .server-card:active {
            transform: scale(0.98);
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .server-info {
            flex: 1;
            text-align: left;
        }

        .server-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .server-detail {
            font-size: 12px;
            color: #888;
        }

        .server-arrow {
            color: #555;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .server-card:hover .server-arrow {
            color: #2ecc71;
            transform: translateX(3px);
        }

        .loading {
            color: #666;
            font-size: 14px;
            padding: 30px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        #status {
            margin-top: 15px;
            color: #555;
            font-size: 12px;
        }

        .footer {
            margin-top: 30px;
            color: #444;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1><i class="fas fa-gamepad"></i> 加入 Minecraft 伺服器</h1>
        <p class="subtitle">選擇要加入的伺服器</p>

        <div id="serverList" class="server-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>
        </div>

        <div id="status"></div>

        <div class="footer">
            點擊後將自動開啟 Minecraft 並加入伺服器
        </div>
    </div>

    <script>
        async function init() {
            const ip = window.location.hostname;
            const listEl = document.getElementById('serverList');

            try {
                const res = await fetch('/public_config?t=' + Date.now());
                if (!res.ok) throw new Error('API 回應錯誤');
                const conf = await res.json();

                const instances = conf.instances || [];
                if (instances.length === 0) {
                    // 單一伺服器模式（向下相容）
                    instances.push({
                        name: conf.server_title || 'Minecraft Server',
                        port: conf.port || 19132
                    });
                }

                listEl.innerHTML = '';

                instances.forEach((srv, idx) => {
                    const nameEnc = encodeURIComponent(srv.name);
                    const link = `minecraft://?addExternalServer=${nameEnc}|${ip}:${srv.port}`;

                    const card = document.createElement('a');
                    card.href = link;
                    card.className = 'server-card';
                    card.innerHTML = `
                        <div class="server-icon">
                            <i class="fas fa-cube"></i>
                        </div>
                        <div class="server-info">
                            <div class="server-name">${srv.name}</div>
                            <div class="server-detail">
                                <i class="fas fa-network-wired"></i> ${ip}:${srv.port}
                            </div>
                        </div>
                        <div class="server-arrow">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    `;
                    card.onclick = () => {
                        document.getElementById('status').innerText = `正在呼叫 Minecraft 加入 ${srv.name}...`;
                    };
                    listEl.appendChild(card);
                });

                // 如果只有一個伺服器，自動啟動
                if (instances.length === 1) {
                    const nameEnc = encodeURIComponent(instances[0].name);
                    const link = `minecraft://?addExternalServer=${nameEnc}|${ip}:${instances[0].port}`;
                    setTimeout(() => {
                        window.location.href = link;
                        document.getElementById('status').innerText = '若未自動開啟，請點擊上方按鈕';
                    }, 800);
                }

            } catch (e) {
                console.error('Config load failed', e);
                // 降級到預設
                const link = `minecraft://?addExternalServer=Minecraft%20Server|${ip}:19132`;
                listEl.innerHTML = `
                    <a href="${link}" class="server-card">
                        <div class="server-icon"><i class="fas fa-cube"></i></div>
                        <div class="server-info">
                            <div class="server-name">Minecraft Server</div>
                            <div class="server-detail"><i class="fas fa-network-wired"></i> ${ip}:19132</div>
                        </div>
                        <div class="server-arrow"><i class="fas fa-chevron-right"></i></div>
                    </a>
                `;
            }
        }

        window.onload = init;
    </script>
</body>

</html>
